<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />

    <script src="https://code.createjs.com/1.0.0/createjs.min.js"></script>
    <script src="bonky.js"></script>
    <script>
      function completeInit(){
        init();
      }
    </script>
  </head>
  <body onload="completeInit();">
    <div id="full-screen"> 
        <div class="overlay" id="blank-overlay"></div>
        <div class="overlay" id="dialogue-overlay">
          <div class="overlay" id="inner-overlay"></div>
          <div class="dialogue-flex" id="intro-screen">
            <p class="dialogue-text">Welcome to Turnyturn! Please rest your phone on a flat surface facing directly forwards and grant motion permission to proceed.</p>
            <img class="dialogue-img" src="media/instructions/intro.png">
            <button class="button" id="permission-button">Grant Permission</button>
          </div>
          <div class="dialogue-flex" id="dialogue-main">
            <p class="dialogue-text">n!</p>
            <img class="dialogue-img" src="media/arrow.svg">
          </div>
          <div class="dialogue-flex" id="survey-screen">
            <p class="dialogue-text">Thanks for completing the study! <span class="important">Your participant number is (HERE!)</span>. Please complete the survey I've linked below. :)</p>
            <img class="dialogue-img" src="media/instructions/qrcode.png">
            <button class="button" onclick="location.href='https://forms.office.com/e/MPy1uh00Qx';">Go to Survey (Microsoft Form)</button>
          </div>
        </div>
    </div>
    <div id="game">
      <div id="hole-div">
        <div id="holes">
            
        </div>
        <div id="arrow-div">
          <img id="arrow" src="media/arrow.svg" />
        </div>
      </div>
        <div id="counter-div">
                <p id="counter">‎ </p>
        </div>
      <div id="dial-div">
        <img id="dial-shadow" src="media/dial-shadow.svg" />
        <img id="dial" src="media/dial.svg" />
      </div>
      <p id="rotation-label">null Degrees!</p>
      <p id="score-label">Score: 0</p>
    </div>
  </body>

  <script type="module" src="script.js"></script>
</html>
